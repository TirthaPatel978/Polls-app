<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Polls App</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    {% load static %}
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'polls/style.css' %}">
</head>

<body>

<div class="container mt-5">
    <h1 class="text-center text-primary" style="color: rgb(255, 255, 255);">Polls App </h1>

    {% if latest_question_list %}
        <ul class="list-group mt-4">
        {% for question in latest_question_list %}
            <li class="list-group-item">
                <a href="{% url 'polls:detail' question.id %}" class="text-decoration-none">
                    {{ question.question_text }}
                </a>
            </li>
        {% endfor %}
        </ul>
    {% else %}
        <p class="text-center">No polls are available.</p>
    {% endif %}
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
